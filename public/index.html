<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amapiano</title>
<link rel="icon" href="/logo.png">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050505;--bg-elevated:#0d0d0d;--bg-card:#111;--bg-hover:#161616;--bg-active:#1a1008;
  --border:#1a1a1a;--border-hover:#2a2a2a;
  --text:#e8e8e8;--text-secondary:#777;--text-tertiary:#444;
  --accent:#ff5500;--accent-hover:#e64d00;--accent-glow:rgba(255,85,0,.12);
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --font:'DM Sans',sans-serif;--mono:'Space Mono',monospace;
  --topbar-h:56px;--filter-h:42px;--player-h:72px;
}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#333}

body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ═══ TOPBAR ═══ */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:rgba(8,8,8,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px 0 80px;z-index:100;gap:14px}
.topbar .hamburger{width:36px;height:36px;border-radius:var(--radius-sm);border:none;background:none;color:var(--text-secondary);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.topbar .hamburger:hover{background:var(--bg-hover);color:var(--text)}
.topbar .brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar .brand img{width:28px;height:28px;border-radius:6px}
.topbar .brand h1{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}

.topbar .nav{display:flex;gap:2px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:2px;margin-left:12px}
.topbar .nav button{padding:6px 11px;border:none;background:none;color:var(--text-tertiary);font-size:13px;cursor:pointer;border-radius:6px;transition:all .2s;font-family:var(--font);line-height:1}
.topbar .nav button:hover{color:var(--text-secondary)}
.topbar .nav button.active{background:var(--accent);color:#fff}

.search-box{flex:1;max-width:340px;position:relative;margin:0 auto}
.search-box input{width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 32px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text-tertiary)}
.search-box::before{content:"\2315";position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);font-size:15px}

.topbar .stats{font-size:11px;color:var(--text-tertiary);margin-left:auto;flex-shrink:0;font-family:var(--mono);letter-spacing:-.3px}
.scan-btn,.auto-tag-btn{padding:6px 14px;border-radius:var(--radius-sm);font-size:11px;cursor:pointer;font-weight:600;font-family:var(--font);transition:all .2s;letter-spacing:.2px}
.scan-btn{background:none;border:1px solid var(--border);color:var(--text-secondary)}
.scan-btn:hover{border-color:var(--accent);color:var(--accent)}
.auto-tag-btn{background:none;border:1px solid var(--border);width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);padding:0}
.auto-tag-btn:hover{border-color:#1db954;background:rgba(29,185,84,.1)}

/* ═══ SIDEBAR ═══ */
.sidebar{position:fixed;left:0;top:var(--topbar-h);bottom:0;width:290px;background:rgba(8,8,8,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--border);z-index:90;overflow-y:auto;padding:16px 12px;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.sidebar.open{transform:translateX(0)}
.sidebar h3{font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 8px;padding:0 10px;font-weight:600}
.sidebar .pl-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;color:var(--text-secondary)}
.sidebar .pl-item:hover{background:var(--bg-hover);color:var(--text)}
.sidebar .pl-item.active{background:var(--bg-active);color:var(--accent)}
.sidebar .pl-item .pl-count{font-size:11px;color:var(--text-tertiary);margin-left:auto;font-family:var(--mono)}
.sidebar .pl-item .pl-icon{font-size:14px;width:22px;text-align:center;flex-shrink:0;opacity:.6}
.sidebar .pl-item.active .pl-icon{opacity:1}
.sidebar .new-pl{padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:8px;transition:all .15s}
.sidebar .new-pl:hover{background:var(--bg-hover);color:var(--text-secondary)}
.sidebar .serato-section{border-top:1px solid var(--border);margin-top:16px;padding-top:4px}
.sidebar .serato-section[open] .serato-arrow{transform:rotate(90deg)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:80;display:none;backdrop-filter:blur(4px)}
.overlay.active{display:block}

/* ═══ FILTER BAR ═══ */
.filterbar{position:fixed;top:var(--topbar-h);left:0;right:0;height:var(--filter-h);background:rgba(8,8,8,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:6px;z-index:70;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.filterbar::-webkit-scrollbar{display:none}
.filter-chip{padding:5px 12px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text-secondary);cursor:pointer;white-space:nowrap;font-weight:500;transition:all .2s;font-family:var(--font)}
.filter-chip:hover{border-color:var(--border-hover);color:var(--text)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-chip .count{color:var(--text-tertiary);margin-left:3px;font-family:var(--mono);font-size:10px}
.filter-chip.active .count{color:rgba(255,255,255,.7)}

/* ═══ CONTENT ═══ */
.content{margin-top:calc(var(--topbar-h) + var(--filter-h));padding:24px;padding-bottom:calc(var(--player-h) + 24px)}

/* Hero */
.hero-section{margin-bottom:32px}
.hero-section h2{font-size:22px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px}
.carousel{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.carousel::-webkit-scrollbar{height:4px}
.carousel::-webkit-scrollbar-thumb{background:#222;border-radius:2px}

.hero-card{flex-shrink:0;width:170px;scroll-snap-align:start;cursor:pointer;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.hero-card:hover{transform:translateY(-4px)}
.art-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:var(--radius);background:var(--bg-card);overflow:hidden}
.art-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.hero-card:hover .art-wrap img,.grid-card:hover .art-wrap img{transform:scale(1.05)}
.art-wrap .no-art{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--text-tertiary);background:linear-gradient(145deg,#111,#181818)}
.art-wrap .play-overlay{position:absolute;bottom:8px;right:8px;width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(4px);transition:all .25s;box-shadow:0 4px 16px rgba(255,85,0,.3)}
.hero-card:hover .play-overlay,.grid-card:hover .play-overlay{opacity:1;transform:translateY(0)}
.art-wrap .play-overlay::after{content:"";border-style:solid;border-width:5px 0 5px 9px;border-color:transparent transparent transparent white;margin-left:2px}

.badge-row{position:absolute;top:6px;right:6px;display:flex;gap:3px;z-index:5}
.badge{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.badge-video{background:rgba(0,0,0,.6)}
.badge-video svg{width:13px;height:13px;fill:#fff}
.badge-lyrics{background:rgba(0,80,0,.65)}
.badge-lyrics svg{width:12px;height:12px;fill:#5f5}

.meta{padding:8px 2px 0}
.meta .title{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.meta .artist{font-size:11px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.meta .genre-tag{display:inline-block;font-size:9px;padding:2px 7px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;color:var(--text-secondary);margin-top:4px;font-weight:500}

/* Grid */
.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:18px}
.grid-card{cursor:pointer;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.grid-card:hover{transform:translateY(-4px)}

/* List */
.list-view{width:100%}
.list-header{display:grid;grid-template-columns:44px 1.2fr 1fr 140px 70px 55px;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:1px;font-weight:600;position:sticky;top:calc(var(--topbar-h) + var(--filter-h));background:var(--bg);z-index:10}
.list-row{display:grid;grid-template-columns:44px 1.2fr 1fr 140px 70px 55px;gap:10px;padding:7px 12px;align-items:center;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .15s}
.list-row:hover{background:var(--bg-hover)}
.list-row.playing{background:var(--bg-active)}
.list-row .art{width:38px;height:38px;border-radius:5px;overflow:hidden;background:var(--bg-card);position:relative}
.list-row .art img{width:100%;height:100%;object-fit:cover}
.list-row .art .no-art{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-tertiary)}
.list-row .title{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-row .artist{font-size:12px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.genre-editable{background:var(--bg-elevated);border:1px solid transparent;border-radius:5px;padding:4px 8px;color:var(--text-secondary);font-size:11px;cursor:pointer;min-width:50px;outline:none;width:100%;font-family:var(--font);transition:border-color .2s}
.genre-editable:hover{border-color:var(--border-hover)}
.genre-editable:focus{border-color:var(--accent);color:var(--text)}
.list-row .duration{font-size:11px;color:var(--text-tertiary);font-family:var(--mono)}
.list-row .flags-cell{display:flex;gap:3px}
.list-row .mini-badge{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.list-row .mini-badge svg{width:10px;height:10px}

/* Thumbnail */
.thumb-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:4px}
.thumb-row{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s}
.thumb-row:hover{background:var(--bg-hover)}
.thumb-row.playing{background:var(--bg-active)}
.thumb-row .art{width:50px;height:50px;border-radius:6px;overflow:hidden;background:var(--bg-card);flex-shrink:0;position:relative}
.thumb-row .art img{width:100%;height:100%;object-fit:cover}
.thumb-row .art .no-art{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-tertiary)}
.thumb-row .info{flex:1;min-width:0}
.thumb-row .info .title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thumb-row .info .artist{font-size:11px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.thumb-row .info .genre-sm{font-size:10px;color:var(--text-tertiary);margin-top:2px}
.thumb-row .duration{font-size:11px;color:var(--text-tertiary);font-family:var(--mono);flex-shrink:0}
.thumb-row .flags-cell{display:flex;gap:3px;flex-shrink:0}

/* CoverFlow */
.coverflow-section{background:linear-gradient(180deg,#0a0a0a 0%,var(--bg) 100%);border-radius:var(--radius-lg);padding:24px 0;user-select:none;position:relative}
.cf-scroll{display:flex;gap:18px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;padding:24px 0;align-items:center;justify-content:center;min-height:280px}
.cf-scroll::-webkit-scrollbar{display:none}
.cf-scroll::before,.cf-scroll::after{content:"";flex-shrink:0;width:calc(50% - 120px)}
.cf-card{flex-shrink:0;width:230px;scroll-snap-align:center;cursor:pointer;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s,filter .35s;opacity:.35;filter:brightness(.5) saturate(.7)}
.cf-card.active{opacity:1;transform:scale(1.12);filter:brightness(1) saturate(1);z-index:10}
.cf-card:hover:not(.active){opacity:.6;filter:brightness(.7)}
.cf-card img{width:230px;height:230px;object-fit:cover;border-radius:var(--radius);box-shadow:0 12px 40px rgba(0,0,0,.7);display:block}
.cf-card .no-art{width:230px;height:230px;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text-tertiary);background:linear-gradient(145deg,#111,#1a1a1a);border-radius:var(--radius);box-shadow:0 12px 40px rgba(0,0,0,.7)}
.cf-nav{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:50%;color:#fff;font-size:20px;cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.cf-nav:hover{background:rgba(255,255,255,.12)}
.cf-nav.left{left:16px}
.cf-nav.right{right:16px}
.cf-slider-row{display:flex;align-items:center;gap:14px;padding:12px 28px 0}
.cf-slider{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:#1a1a1a;border-radius:2px;outline:none}
.cf-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:none;box-shadow:0 0 8px rgba(255,85,0,.3)}
.cf-slider-label{font-size:11px;color:var(--text-tertiary);min-width:80px;text-align:center;font-family:var(--mono)}
.cf-info{text-align:center;padding:14px 12px 8px}
.cf-info .title{font-size:18px;font-weight:700;margin-bottom:3px;letter-spacing:-.3px}
.cf-info .artist{font-size:14px;color:var(--text-secondary)}
.cf-info .album{font-size:12px;color:var(--text-tertiary);margin-top:3px}
.cf-list{border-top:1px solid var(--border);max-height:300px;overflow-y:auto}

/* ═══ PLAYER ═══ */
.player{position:fixed;bottom:0;left:0;right:0;height:var(--player-h);background:rgba(10,10,10,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:none;align-items:center;padding:0 20px;gap:14px;z-index:100}
.player.active{display:flex}
.player .player-art{width:48px;height:48px;border-radius:7px;overflow:hidden;background:var(--bg-card);flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.player .player-art img{width:100%;height:100%;object-fit:cover}
.player .player-info{min-width:0;max-width:200px}
.player .player-info .title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.player .player-info .artist{font-size:11px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.player .play-btn{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,background .15s;box-shadow:0 2px 12px rgba(255,85,0,.25)}
.player .play-btn:hover{transform:scale(1.08);background:var(--accent-hover)}
.player .play-btn:active{transform:scale(.95)}
.player .play-btn svg{fill:white;width:14px;height:14px}
.player .waveform-wrap{flex:1;height:40px;cursor:pointer;position:relative;border-radius:4px;overflow:hidden;background:var(--bg-elevated)}
.player .waveform-wrap canvas{width:100%;height:100%;display:block}
.player .waveform-wrap .wf-playhead{position:absolute;top:0;bottom:0;width:2px;background:#fff;pointer-events:none;z-index:2;box-shadow:0 0 6px rgba(255,255,255,.4);transition:none}
.player .waveform-wrap .wf-hover{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.25);pointer-events:none;z-index:1;display:none}
.player .waveform-wrap:hover .wf-hover{display:block}
.player .time{font-size:11px;color:var(--text-tertiary);font-family:var(--mono);min-width:85px;text-align:center;letter-spacing:-.3px}
.player .add-to-pl{padding:5px 12px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:10px;color:var(--text-secondary);cursor:pointer;white-space:nowrap;font-family:var(--font);font-weight:500;transition:all .2s}
.player .add-to-pl:hover{border-color:var(--accent);color:var(--accent)}

/* ═══ MODALS ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal-overlay.active{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px;letter-spacing:-.2px}
.modal .field{margin-bottom:14px}
.modal .field label{display:block;font-size:10px;color:var(--text-tertiary);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.modal .field input,.modal .field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .2s}
.modal .field input:focus{border-color:var(--accent)}
.modal .tags-input{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.modal .tag-pill{display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;font-size:11px;color:var(--text-secondary);font-weight:500}
.modal .tag-pill .remove{cursor:pointer;color:var(--text-tertiary);font-size:13px;transition:color .15s}
.modal .tag-pill .remove:hover{color:var(--accent)}
.modal .btn-row{display:flex;gap:8px;margin-top:18px}
.modal .btn{padding:9px 18px;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
.modal .btn-primary{background:var(--accent);color:#fff}
.modal .btn-primary:hover{background:var(--accent-hover)}
.modal .btn-secondary{background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border)}
.modal .btn-secondary:hover{background:var(--bg-hover);color:var(--text)}
.modal .btn-spotify{background:#1db954;color:#fff}
.modal .btn-spotify:hover{background:#1aa34a}

.modal .pl-modal-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;font-size:13px;margin-bottom:4px}
.modal .pl-modal-item:hover{background:var(--bg-hover)}
.modal .pl-modal-item .pl-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0;color:var(--accent)}
.modal .pl-modal-item .pl-name{flex:1;font-weight:500}
.modal .pl-modal-item .pl-count{font-size:11px;color:var(--text-tertiary);font-family:var(--mono)}

.empty-state{text-align:center;padding:80px 20px;color:var(--text-tertiary)}
.empty-state h2{font-size:24px;margin-bottom:12px;color:var(--text-secondary);font-weight:700;letter-spacing:-.3px}
.empty-state p{font-size:14px;margin-bottom:24px}
.empty-state .scan-big{padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;box-shadow:0 4px 20px rgba(255,85,0,.25)}
.empty-state .scan-big:hover{background:var(--accent-hover);transform:translateY(-1px)}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.grid-card,.thumb-row,.list-row{animation:fadeIn .3s ease both}
.grid-card:nth-child(n+2){animation-delay:.02s}
.grid-card:nth-child(n+3){animation-delay:.04s}
.grid-card:nth-child(n+4){animation-delay:.06s}
</style>
</head>
<body>

<div class="topbar">
  <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
  <div class="brand">
    <img src="/logo.png" alt="Amapiano">
    <h1>Amapiano</h1>
  </div>
  <div class="nav">
    <button onclick="setView('list')" id="viewList" title="List">&#9776;</button>
    <button onclick="setView('thumb')" id="viewThumb" title="Thumbnails">&#8862;</button>
    <button class="active" onclick="setView('grid')" id="viewGrid" title="Grid">&#8863;</button>
    <button onclick="setView('coverflow')" id="viewCoverflow" title="CoverFlow">&#9636;</button>
  </div>
  <div class="search-box"><input type="text" id="searchInput" placeholder="Search songs, artists... (#tag)" oninput="debounceSearch()"></div>
  <span class="stats" id="statsText">Loading...</span>
  <button class="auto-tag-btn" id="autoTagBtn" onclick="autoTagGenres()" title="Spotify Auto-Tag"><svg width="16" height="16" viewBox="0 0 24 24" fill="#1db954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg></button>
  <button class="scan-btn" id="scanBtn" onclick="scanLibrary()">Scan</button>
</div>

<!-- Sidebar -->
<div class="overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <h3>Library</h3>
  <div class="pl-item active" data-sb="all" onclick="sbSelect(this);showAll()"><span class="pl-icon">&#9835;</span>All Songs<span class="pl-count" id="allCount"></span></div>
  <div class="pl-item" data-sb="video" onclick="sbSelect(this);filterFlag('video')"><span class="pl-icon">&#9729;</span>Music Videos<span class="pl-count" id="videoCount"></span></div>
  <div class="pl-item" data-sb="lyrics" onclick="sbSelect(this);filterFlag('lyrics')"><span class="pl-icon">&#10003;</span>Lyrics<span class="pl-count" id="lyricsCount"></span></div>
  <div class="pl-item" data-sb="untagged" onclick="sbSelect(this);showUntagged()"><span class="pl-icon">?</span>No Genre<span class="pl-count" id="untaggedCount"></span></div>

  <h3>Playlists</h3>
  <div id="playlistsList"></div>
  <div class="new-pl" onclick="createPlaylist()">+ New Playlist</div>

  <details class="serato-section">
    <summary style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:1px;cursor:pointer;padding:12px 10px 8px;user-select:none;list-style:none;display:flex;align-items:center;gap:6px;font-weight:600"><span class="serato-arrow" style="font-size:8px;transition:transform .2s">&#9654;</span> Serato Crates</summary>
    <div id="seratoCrates"></div>
  </details>
</div>

<div class="filterbar" id="filterBar"></div>

<div class="content" id="content">
  <div class="empty-state" id="emptyState">
    <h2>Welcome to Amapiano</h2>
    <p>Scan your Music folder to import tracks.</p>
    <button class="scan-big" onclick="scanLibrary()">Scan Music Folder</button>
  </div>
  <div id="heroSection" class="hero-section" style="display:none">
    <h2>Recently Added</h2>
    <div class="carousel" id="heroCarousel"></div>
  </div>
  <div id="mainGrid" class="grid-view" style="display:none"></div>
  <div id="mainThumb" class="thumb-view" style="display:none"></div>
  <div id="mainList" class="list-view" style="display:none"></div>
  <div id="mainCoverflow" style="display:none">
    <div class="coverflow-section" id="cfContainer">
      <button class="cf-nav left" onclick="cfIndex=Math.max(0,cfIndex-1);cfSliderChange(cfIndex)">&#8249;</button>
      <div class="cf-scroll" id="cfScroll"></div>
      <button class="cf-nav right" onclick="cfIndex=Math.min((cfTracksCached||[]).length-1,cfIndex+1);cfSliderChange(cfIndex)">&#8250;</button>
      <div class="cf-slider-row">
        <span class="cf-slider-label" id="cfSliderLabel">1 / 0</span>
        <input type="range" class="cf-slider" id="cfSlider" min="0" max="0" value="0" oninput="cfSliderChange(this.value)">
      </div>
    </div>
    <div class="cf-info"><div class="title" id="cfTitle"></div><div class="artist" id="cfArtist"></div><div class="album" id="cfAlbum"></div></div>
    <div class="cf-list list-view" id="cfList"></div>
  </div>
</div>

<div class="player" id="player">
  <div class="player-art" id="playerArt" onclick="goToCurrentInCoverflow()" style="cursor:pointer" title="Show in CoverFlow"></div>
  <div class="player-info" onclick="goToCurrentInCoverflow()" style="cursor:pointer" title="Show in CoverFlow"><div class="title" id="playerTitle"></div><div class="artist" id="playerArtist"></div></div>
  <button class="play-btn" onclick="togglePlayerPlay()">
    <svg id="pPlayIcon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
    <svg id="pPauseIcon" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
  </button>
  <span class="time" id="playerTime">0:00 / 0:00</span>
  <div class="waveform-wrap" id="waveformWrap" onclick="seekPlayer(event)" onmousemove="wfHover(event)" onmouseleave="wfHoverHide()">
    <canvas id="waveformCanvas"></canvas>
    <div class="wf-playhead" id="wfPlayhead" style="left:0"></div>
    <div class="wf-hover" id="wfHoverLine"></div>
  </div>
  <button class="add-to-pl" onclick="showAddToPlaylist()">+ Playlist</button>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="tagModal" onclick="if(event.target===this)closeTagModal()">
  <div class="modal">
    <h3>Edit Track</h3>
    <div class="field"><label>Title</label><input type="text" id="editTitle"></div>
    <div class="field"><label>Artist</label><input type="text" id="editArtist"></div>
    <div class="field">
      <label>Genre</label>
      <input type="text" id="editGenre" placeholder="e.g. Amapiano, Jersey Club" list="genreList">
      <datalist id="genreList"></datalist>
    </div>
    <div class="field">
      <label>Custom Tags</label>
      <div class="tags-input" id="editTags"></div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <input type="text" id="newTagInput" placeholder="Type tag + Enter" style="flex:1" onkeydown="if(event.key==='Enter'){addCustomTag();event.preventDefault()}">
        <button class="btn btn-secondary" onclick="addCustomTag()" style="padding:7px 14px;font-size:11px">Add</button>
      </div>
    </div>
    <details style="margin-bottom:14px">
      <summary style="font-size:10px;color:var(--text-tertiary);cursor:pointer;text-transform:uppercase;letter-spacing:1px;user-select:none;font-weight:600">File Location</summary>
      <div id="editFilePath" style="font-size:11px;color:var(--text-tertiary);font-family:var(--mono);word-break:break-all;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm);user-select:all;cursor:text;margin-top:6px;border:1px solid var(--border)"></div>
    </details>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveTrackEdit()">Save</button>
      <button class="btn btn-spotify" onclick="spotifyLookup()">Spotify Genre</button>
      <button class="btn btn-secondary" onclick="closeTagModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Add to playlist modal -->
<div class="modal-overlay" id="plModal" onclick="if(event.target===this)closePlModal()">
  <div class="modal">
    <h3>Add to Playlist</h3>
    <div id="plModalList"></div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-primary" onclick="createPlaylistAndAdd()">+ New Playlist</button>
      <button class="btn btn-secondary" onclick="closePlModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API="/api";
let allTracks=[],filteredTracks=[],currentView="grid",currentGenre="",currentSearch="",currentPlaylistId=null;
let audioEl=new Audio(),currentTrack=null,isPlaying=false,animId;
let editingTrackId=null,editCustomTags=[];

const SVG_VIDEO=`<svg viewBox="0 0 24 24"><path d="M19.35 10.04A7.49 7.49 0 0012 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>`;
const SVG_CHECK=`<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;

function badges(flags){
  if(!flags||!flags.length)return"";
  let h='<div class="badge-row">';
  if(flags.includes("video"))h+=`<div class="badge badge-video">${SVG_VIDEO}</div>`;
  if(flags.includes("lyrics")||flags.includes("visualizer"))h+=`<div class="badge badge-lyrics">${SVG_CHECK}</div>`;
  return h+"</div>";
}
function miniBadges(flags){
  if(!flags||!flags.length)return"";
  let h="";
  if(flags.includes("video"))h+=`<div class="mini-badge badge-video">${SVG_VIDEO}</div>`;
  if(flags.includes("lyrics")||flags.includes("visualizer"))h+=`<div class="mini-badge badge-lyrics">${SVG_CHECK}</div>`;
  return h;
}

async function init(){
  const res=await fetch(`${API}/tracks`);
  const data=await res.json();
  allTracks=data.tracks;filteredTracks=allTracks;
  if(!allTracks.length){document.getElementById("emptyState").style.display="block";document.getElementById("heroSection").style.display="none"}
  else{document.getElementById("emptyState").style.display="none";document.getElementById("heroSection").style.display="block";buildFilters();renderHero();render()}
  updateStats();loadPlaylists();loadSeratoCrates();
}

async function scanLibrary(){
  const btn=document.getElementById("scanBtn");btn.textContent="Scanning...";btn.disabled=true;
  try{const res=await fetch(`${API}/scan`,{method:"POST"});const data=await res.json();btn.textContent=`${data.new} new`;setTimeout(()=>{btn.textContent="Scan";btn.disabled=false},2000);init()}
  catch(e){btn.textContent="Error";setTimeout(()=>{btn.textContent="Scan";btn.disabled=false},2000)}
}

async function updateStats(){
  const res=await fetch(`${API}/stats`);const data=await res.json();
  document.getElementById("statsText").textContent=`${data.total} tracks \u00b7 ${data.no_genre} untagged`;
  document.getElementById("allCount").textContent=data.total;
  document.getElementById("videoCount").textContent=data.video_count;
  document.getElementById("lyricsCount").textContent=data.lyrics_count;
  document.getElementById("untaggedCount").textContent=data.no_genre;
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("active");
}
function sbSelect(el){
  document.querySelectorAll(".sidebar .pl-item").forEach(i=>i.classList.remove("active"));
  if(el){el.classList.add("active");activeSidebarId=el.dataset.sb||null}
}
function showAll(){currentPlaylistId=null;activeSidebarId='all';filteredTracks=allTracks;render();toggleSidebar()}
function showUntagged(){currentPlaylistId=null;activeSidebarId='untagged';filteredTracks=allTracks.filter(t=>!t.genre);render();toggleSidebar()}
function filterFlag(f){currentPlaylistId=null;activeSidebarId=f;filteredTracks=allTracks.filter(t=>(t.flags||[]).includes(f));render();toggleSidebar()}

async function buildFilters(){
  const res=await fetch(`${API}/tags`);const data=await res.json();
  const bar=document.getElementById("filterBar");
  bar.innerHTML=`<div class="filter-chip active" data-genre="" onclick="filterGenre(this)">All <span class="count">${allTracks.length}</span></div>`;
  bar.innerHTML+=`<div class="filter-chip" data-genre="__none__" onclick="filterGenre(this)">No Genre <span class="count">${allTracks.filter(t=>!t.genre).length}</span></div>`;
  for(const g of data.genres){const c=allTracks.filter(t=>t.genre===g).length;bar.innerHTML+=`<div class="filter-chip" data-genre="${esc(g)}" onclick="filterGenre(this)">${esc(g)} <span class="count">${c}</span></div>`}
}
function filterGenre(el){
  document.querySelectorAll(".filter-chip").forEach(c=>c.classList.remove("active"));el.classList.add("active");
  currentGenre=el.dataset.genre||"";currentPlaylistId=null;applyFilters();
}
function applyFilters(){
  filteredTracks=allTracks;
  if(currentGenre==="__none__")filteredTracks=filteredTracks.filter(t=>!t.genre);
  else if(currentGenre)filteredTracks=filteredTracks.filter(t=>t.genre===currentGenre);
  if(currentSearch){
    if(currentSearch.startsWith("#")){
      const tag=currentSearch.slice(1).toLowerCase();
      filteredTracks=filteredTracks.filter(t=>(t.custom_tags||[]).some(ct=>ct.toLowerCase().includes(tag)));
    }else{
      const q=currentSearch.toLowerCase();
      filteredTracks=filteredTracks.filter(t=>t.title.toLowerCase().includes(q)||t.artist.toLowerCase().includes(q));
    }
  }
  updateFilteredStats();render();
}
function updateFilteredStats(){
  const el=document.getElementById("statsText");
  const tracks=currentSearch||currentGenre||currentPlaylistId?filteredTracks:allTracks;
  const totalSec=tracks.reduce((s,t)=>s+(t.duration||0),0);
  const totalBytes=tracks.reduce((s,t)=>s+(t.file_size||0),0);
  const hours=Math.floor(totalSec/3600);
  const mins=Math.floor((totalSec%3600)/60);
  const timeStr=hours>0?`${hours}h ${mins}m`:`${mins}m`;
  let sizeStr='';
  if(totalBytes>0){const gb=totalBytes/1073741824;sizeStr=gb>=1?` \u00b7 ${gb.toFixed(1)} GB`:` \u00b7 ${(totalBytes/1048576).toFixed(0)} MB`}
  if(currentSearch||currentGenre||currentPlaylistId){
    el.textContent=`${tracks.length} tracks \u00b7 ${timeStr}${sizeStr}`;
  }else{
    el.textContent=`${tracks.length} tracks \u00b7 ${timeStr}${sizeStr} \u00b7 ${allTracks.filter(t=>!t.genre).length} untagged`;
  }
}
let searchTimer;
function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(()=>{currentSearch=document.getElementById("searchInput").value.trim();applyFilters()},200)}

let cfIndex=0;
function setView(v){
  currentView=v;
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  const btn=document.getElementById("view"+v.charAt(0).toUpperCase()+v.slice(1));
  if(btn)btn.classList.add("active");
  render();
}

let heroDone=false;
function renderHero(){
  if(heroDone)return;
  const carousel=document.getElementById("heroCarousel");
  const hero=[...allTracks.filter(t=>t.cover).sort(()=>Math.random()-.5).slice(0,25),...allTracks.filter(t=>!t.cover).sort(()=>Math.random()-.5).slice(0,5)].slice(0,25);
  carousel.innerHTML=hero.map(t=>`<div class="hero-card" onclick="playTrack('${t.id}')" ondblclick="openTagModal('${t.id}')"><div class="art-wrap">${t.cover?`<img src="${t.cover}" loading="lazy">`:`<div class="no-art">\u266B</div>`}${badges(t.flags)}<div class="play-overlay"></div></div><div class="meta"><div class="title">${esc(t.title)}</div><div class="artist">${esc(t.artist)}</div></div></div>`).join("");
  heroDone=true;
}

function render(){
  const views=["mainGrid","mainList","mainThumb","mainCoverflow"];
  views.forEach(v=>document.getElementById(v).style.display="none");
  const heroEl=document.getElementById("heroSection");
  if(heroEl)heroEl.style.display=currentView==="coverflow"?"none":"block";
  if(currentView==="grid"){document.getElementById("mainGrid").style.display="grid";renderGrid()}
  else if(currentView==="list"){document.getElementById("mainList").style.display="block";renderList()}
  else if(currentView==="thumb"){document.getElementById("mainThumb").style.display="grid";renderThumb()}
  else if(currentView==="coverflow"){document.getElementById("mainCoverflow").style.display="block";renderCoverflow()}
}

function renderGrid(){
  document.getElementById("mainGrid").innerHTML=filteredTracks.map(t=>`<div class="grid-card" onclick="playTrack('${t.id}')" ondblclick="openTagModal('${t.id}')"><div class="art-wrap">${t.cover?`<img src="${t.cover}" loading="lazy">`:`<div class="no-art">\u266B</div>`}${badges(t.flags)}<div class="play-overlay"></div></div><div class="meta"><div class="title">${esc(t.title)}</div><div class="artist">${esc(t.artist)}</div>${t.genre?`<span class="genre-tag">${esc(t.genre)}</span>`:""}</div></div>`).join("");
}

function renderList(){
  let h=`<div class="list-header"><span></span><span>Title</span><span>Artist</span><span>Genre</span><span></span><span>Time</span></div>`;
  h+=filteredTracks.map(t=>`<div class="list-row${currentTrack?.id===t.id?" playing":""}" onclick="playTrack('${t.id}')" ondblclick="openTagModal('${t.id}')"><div class="art">${t.cover?`<img src="${t.cover}" loading="lazy">`:`<div class="no-art">\u266B</div>`}</div><div class="title">${esc(t.title)}</div><div class="artist">${esc(t.artist)}</div><input class="genre-editable" value="${esc(t.genre)}" onclick="event.stopPropagation()" onchange="quickGenre('${t.id}',this.value)" placeholder="+ genre"><div class="flags-cell">${miniBadges(t.flags)}</div><div class="duration">${formatTime(t.duration)}</div></div>`).join("");
  document.getElementById("mainList").innerHTML=h;
}

function renderThumb(){
  document.getElementById("mainThumb").innerHTML=filteredTracks.map(t=>`<div class="thumb-row${currentTrack?.id===t.id?" playing":""}" onclick="playTrack('${t.id}')" ondblclick="openTagModal('${t.id}')"><div class="art">${t.cover?`<img src="${t.cover}" loading="lazy">`:`<div class="no-art">\u266B</div>`}</div><div class="info"><div class="title">${esc(t.title)}</div><div class="artist">${esc(t.artist)}</div>${t.genre?`<div class="genre-sm">${esc(t.genre)}</div>`:""}</div><div class="flags-cell">${miniBadges(t.flags)}</div><div class="duration">${formatTime(t.duration)}</div></div>`).join("");
}

let cfBuilt=false, cfTracksCached=[];
function renderCoverflow(){
  cfTracksCached=filteredTracks.filter(t=>t.cover);
  const scroll=document.getElementById("cfScroll");
  const slider=document.getElementById("cfSlider");
  if(!cfTracksCached.length){scroll.innerHTML="<p style='color:var(--text-tertiary);padding:80px;text-align:center'>No cover art to display</p>";return}
  if(cfIndex>=cfTracksCached.length)cfIndex=cfTracksCached.length-1;
  if(cfIndex<0)cfIndex=0;
  slider.max=cfTracksCached.length-1;slider.value=cfIndex;
  document.getElementById("cfSliderLabel").textContent=`${cfIndex+1} / ${cfTracksCached.length}`;
  cfRenderCards();cfUpdateInfo();
}

function cfRenderCards(){
  const scroll=document.getElementById("cfScroll");
  const total=cfTracksCached.length;
  const WINDOW=10;
  const start=Math.max(0,cfIndex-WINDOW);
  const end=Math.min(total-1,cfIndex+WINDOW);
  let html='';
  for(let i=start;i<=end;i++){
    const t=cfTracksCached[i];
    const isActive=i===cfIndex;
    html+=`<div class="cf-card${isActive?" active":""}" data-idx="${i}" onclick="cfSelect(${i})" ondblclick="openTagModal('${t.id}')">${t.cover?`<img src="${t.cover}">`:`<div class="no-art">\u266B</div>`}</div>`;
  }
  scroll.innerHTML=html;
  requestAnimationFrame(()=>{
    const active=scroll.querySelector(".cf-card.active");
    if(active)active.scrollIntoView({behavior:cfBuilt?"smooth":"instant",block:"nearest",inline:"center"});
    cfBuilt=true;
  });
}

function cfUpdateInfo(){
  if(!cfTracksCached.length)return;
  const ct=cfTracksCached[cfIndex];
  document.getElementById("cfTitle").textContent=ct.title;
  document.getElementById("cfArtist").textContent=ct.artist;
  document.getElementById("cfAlbum").textContent=ct.album||ct.genre||"";
  const artistTracks=filteredTracks.filter(t=>t.artist===ct.artist);
  const listTracks=artistTracks.length>1?artistTracks:filteredTracks;
  let h=`<div class="list-header" style="position:sticky;top:0;background:var(--bg);z-index:5"><span></span><span>Name</span><span>Artist</span><span>Genre</span><span></span><span>Time</span></div>`;
  h+=listTracks.map(t=>`<div class="list-row${currentTrack?.id===t.id?" playing":""}${t.id===ct.id?" playing":""}" onclick="playTrack('${t.id}')" ondblclick="openTagModal('${t.id}')"><div class="art">${t.cover?`<img src="${t.cover}" loading="lazy">`:`<div class="no-art">\u266B</div>`}</div><div class="title">${esc(t.title)}</div><div class="artist">${esc(t.artist)}</div><div class="genre" style="font-size:11px;color:var(--text-tertiary)">${esc(t.genre)}</div><div class="flags-cell">${miniBadges(t.flags)}</div><div class="duration">${formatTime(t.duration)}</div></div>`).join("");
  document.getElementById("cfList").innerHTML=h;
}

function cfSelect(i){cfIndex=i;document.getElementById("cfSlider").value=i;document.getElementById("cfSliderLabel").textContent=`${i+1} / ${cfTracksCached.length}`;cfRenderCards();cfUpdateInfo();if(cfTracksCached[i])playTrack(cfTracksCached[i].id)}
function cfSliderChange(val){cfIndex=parseInt(val);document.getElementById("cfSliderLabel").textContent=`${cfIndex+1} / ${cfTracksCached.length}`;cfRenderCards();cfUpdateInfo()}

document.addEventListener("keydown",e=>{
  if(currentView!=="coverflow")return;if(!cfTracksCached.length)return;
  if(e.key==="ArrowLeft"){cfIndex=Math.max(0,cfIndex-1);cfSliderChange(cfIndex);e.preventDefault()}
  if(e.key==="ArrowRight"){cfIndex=Math.min(cfTracksCached.length-1,cfIndex+1);cfSliderChange(cfIndex);e.preventDefault()}
  if(e.key==="Enter"&&cfTracksCached[cfIndex]){playTrack(cfTracksCached[cfIndex].id)}
});

document.getElementById("filterBar").addEventListener("wheel",e=>{

async function autoTagGenres(){
  const untagged=allTracks.filter(t=>!t.genre&&t.artist!=="Unknown").slice(0,50);
  if(!untagged.length){alert("No untagged tracks with known artists");return}
  const btn=document.getElementById("autoTagBtn");const origHTML=btn.innerHTML;btn.textContent="...";btn.disabled=true;
  let done=0;
  for(const t of untagged){
    try{
      const res=await fetch(`${API}/spotify-genre`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title:t.title,artist:t.artist})});
      const data=await res.json();
      if(data.genre){
        await fetch(`${API}/tracks/${t.id}`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({genre:data.genre})});
        t.genre=data.genre;done++;
      }
    }catch(e){}
    btn.textContent=`${done}`;
  }
  btn.textContent=`${done}!`;btn.disabled=false;
  setTimeout(()=>{btn.innerHTML=origHTML},2000);
  buildFilters();applyFilters();updateStats();
}

/* ═══ WAVEFORM ═══ */
const wfCache={};
let wfData=null,wfCtx=null,wfCanvas=null,wfAudioCtx=null;
function getAudioCtx(){if(!wfAudioCtx)wfAudioCtx=new(window.AudioContext||window.webkitAudioContext)();return wfAudioCtx}
async function computeWaveform(audioBuffer,bars){
  const sr=audioBuffer.sampleRate;
  const len=audioBuffer.length;
  const dur=audioBuffer.duration;
  const nCh=audioBuffer.numberOfChannels;

  // Run audio through 3 actual frequency filters using OfflineAudioContext
  async function filterBand(type,freq,freq2){
    const offline=new OfflineAudioContext(1,len,sr);
    const src=offline.createBufferSource();
    src.buffer=audioBuffer;
    if(type==='low'){
      const f=offline.createBiquadFilter();
      f.type='lowpass';f.frequency.value=freq;f.Q.value=0.7;
      src.connect(f);f.connect(offline.destination);
    }else if(type==='high'){
      const f=offline.createBiquadFilter();
      f.type='highpass';f.frequency.value=freq;f.Q.value=0.7;
      src.connect(f);f.connect(offline.destination);
    }else{
      // bandpass = highpass then lowpass
      const hp=offline.createBiquadFilter();
      hp.type='highpass';hp.frequency.value=freq;hp.Q.value=0.7;
      const lp=offline.createBiquadFilter();
      lp.type='lowpass';lp.frequency.value=freq2;lp.Q.value=0.7;
      src.connect(hp);hp.connect(lp);lp.connect(offline.destination);
    }
    src.start(0);
    const rendered=await offline.startRendering();
    return rendered.getChannelData(0);
  }

  const [lowCh,midCh,highCh]=await Promise.all([
    filterBand('low',200),
    filterBand('band',200,2000),
    filterBand('high',2000)
  ]);

  const fullCh=audioBuffer.getChannelData(0);
  const step=Math.floor(len/bars);
  const result={peaks:new Float32Array(bars),low:new Float32Array(bars),mid:new Float32Array(bars),high:new Float32Array(bars)};

  for(let i=0;i<bars;i++){
    const off=i*step;
    let sum=0,sLow=0,sMid=0,sHigh=0;
    for(let j=0;j<step&&off+j<len;j++){
      sum+=Math.abs(fullCh[off+j]);
      sLow+=Math.abs(lowCh[off+j]);
      sMid+=Math.abs(midCh[off+j]);
      sHigh+=Math.abs(highCh[off+j]);
    }
    result.peaks[i]=sum/step;
    result.low[i]=sLow/step;
    result.mid[i]=sMid/step;
    result.high[i]=sHigh/step;
  }

  const norm=(arr)=>{const m=Math.max(...arr)||1;for(let i=0;i<arr.length;i++)arr[i]/=m};
  norm(result.peaks);norm(result.low);norm(result.mid);norm(result.high);
  return result;
}
async function loadWaveform(trackId,path){
  if(wfCache[trackId]){wfData=wfCache[trackId];drawWaveform();return}
  wfData=null;drawWaveform();
  try{
    const resp=await fetch(`${API}/audio/full?path=${encodeURIComponent(path)}`);
    if(!resp.ok)return;
    const buf=await resp.arrayBuffer();
    const actx=getAudioCtx();
    const decoded=await actx.decodeAudioData(buf.slice(0));
    const bars=Math.min(800,wfCanvas?wfCanvas.width:800);
    wfData=await computeWaveform(decoded,bars);
    wfCache[trackId]=wfData;
    drawWaveform();
  }catch(e){console.warn("Waveform:",e);wfData=null}
}
function drawWaveform(){
  if(!wfCanvas)wfCanvas=document.getElementById("waveformCanvas");
  if(!wfCtx)wfCtx=wfCanvas.getContext("2d");
  const wrap=document.getElementById("waveformWrap");
  const dpr=window.devicePixelRatio||1;
  const w=wrap.clientWidth,h=wrap.clientHeight;
  wfCanvas.width=w*dpr;wfCanvas.height=h*dpr;
  wfCtx.scale(dpr,dpr);
  wfCtx.clearRect(0,0,w,h);
  const progress=audioEl.duration?(audioEl.currentTime/audioEl.duration):0;
  const playX=progress*w;
  if(!wfData){
    wfCtx.fillStyle='#ff5500';
    wfCtx.fillRect(0,h/2-1,playX,2);
    wfCtx.fillStyle='#333';
    wfCtx.fillRect(playX,h/2-1,w-playX,2);
    wfCtx.setTransform(1,0,0,1,0,0);
    return;
  }
  const bars=wfData.peaks.length;
  const barW=w/bars;
  const mid=h/2;
  const maxH=h*0.9;
  for(let i=0;i<bars;i++){
    const x=i*barW;
    const bh=Math.max(1,wfData.peaks[i]*maxH/2);
    const lo=wfData.low[i],mi=wfData.mid[i],hi=wfData.high[i];
    const total=lo+mi+hi||1;
    // Serato RGB: red=bass, green=mid, blue=high
    const r=Math.round((lo/total)*255);
    const g=Math.round((mi/total)*255);
    const b=Math.round((hi/total)*255);
    const played=x<playX;
    if(played){
      wfCtx.fillStyle=`rgb(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)})`;
    }else{
      wfCtx.fillStyle=`rgb(${r>>1},${g>>1},${b>>1})`;
    }
    wfCtx.fillRect(x,mid-bh,Math.max(1,barW-0.5),bh*2);
  }
  wfCtx.setTransform(1,0,0,1,0,0);
}
function tickPlayer(){
  const c=audioEl.currentTime,d=audioEl.duration||1;
  const pct=c/d;
  document.getElementById("wfPlayhead").style.left=(pct*100)+"%";

  drawWaveform();
  animId=requestAnimationFrame(tickPlayer);
}
